name: Release APK

# v0.2.0 같은 버전 태그를 push하면 서명된 릴리스 APK를 빌드해 GitHub Release에 첨부한다.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 릴리스 생성/에셋 업로드

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: ver
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -PversionName=${{ steps.ver.outputs.name }} \
            -PversionCode=${{ github.run_number }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk TeslaMirror-${{ github.ref_name }}.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: TeslaMirror-${{ github.ref_name }}.apk
          generate_release_notes: true
